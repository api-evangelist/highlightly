aid: highlightly
url: https://raw.githubusercontent.com/api-evangelist/highlightly/refs/heads/main/apis.yml
name: Highlightly
kind: company
description: Highlightly is a real-time sports data and highlights API covering football,
  basketball, American football, hockey, baseball, cricket, rugby, volleyball, and
  handball across 950+ leagues. Its REST APIs serve live scores, matches, standings,
  team and player statistics, head-to-head records, odds, and on-demand video highlight
  clips, available directly via highlightly.net hosts or through RapidAPI.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Sports
- Sports Data
- Live Scores
- Odds
- Highlights
