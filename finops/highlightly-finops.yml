principles:
- name: Visibility
  description: Read the plan metadata returned in every API response to track daily request consumption against the tier quota.
- name: Allocation
  description: Use separate API keys per workload or sport to attribute request volume to teams and cost centers.
- name: Optimization
  description: Right-size the subscription tier to actual daily request volume; cache stable catalog data (countries, leagues, teams) to reduce request counts; consider annual billing for the advertised discount.
- name: Accountability
  description: Because there are no overage charges, monthly cost is fixed per tier - review request burn vs. quota monthly and downgrade or upgrade tiers as usage shifts.
