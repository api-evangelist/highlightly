description: >-
  FinOps view of Highlightly spend. Highlightly bills a flat monthly
  subscription per tier (Basic free, Pro, Ultra, Mega), each tier defined by a
  daily request quota and a per-second rate limit rather than per-call
  metering. There are no overage charges - once the daily quota is exhausted,
  requests are rejected until reset - so cost is bounded and predictable for a
  given tier. The primary cost lever is matching the subscription tier to
  observed daily request volume across the sport APIs in use.
notes: >-
  Subscription prices and quotas are as published on the Highlightly Football
  API pricing page; per-sport pricing may differ and plans are also available
  through RapidAPI. Verify current rates during reconciliation.
